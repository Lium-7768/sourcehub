name: Probe Refresh

on:
  workflow_dispatch:
    inputs:
      probe_limit:
        description: Max number of probe targets to scan in this run
        required: false
        default: '2000'
  schedule:
    - cron: '*/30 * * * *'

concurrency:
  group: probe-refresh
  cancel-in-progress: false

jobs:
  probe-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      PROBE_LIMIT: ${{ github.event.inputs.probe_limit || '2000' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run probe pipeline
        run: npm run pipeline:public-results

      - name: Commit updated result files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/results/probe_results.json data/results/probe_results.csv data/results/probe_failures.csv src/data/public-results.json
          if git diff --cached --quiet; then
            echo "No result changes to commit"
            exit 0
          fi
          git commit -m "Update probe results"
          git push

      - name: Upload probe artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe-results-${{ github.run_id }}
          path: |
            data/results/probe_results.json
            data/results/probe_results.csv
            data/results/probe_failures.csv
            src/data/public-results.json
          if-no-files-found: warn
          retention-days: 7
