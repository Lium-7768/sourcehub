name: Probe Fixed Target

on:
  workflow_dispatch:
    inputs:
      target_host:
        description: Fixed target host or IP to probe
        required: false
        default: '61.139.2.69'
      target_ports:
        description: Comma-separated ports to probe
        required: false
        default: '80,443'
      probe_attempts:
        description: Connection attempts per port
        required: false
        default: '3'
      probe_timeout_ms:
        description: Timeout per attempt in milliseconds
        required: false
        default: '1500'
      region:
        description: Result label only
        required: false
        default: 'github-actions'

concurrency:
  group: probe-fixed-target
  cancel-in-progress: false

jobs:
  probe-fixed-target:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      TARGET_HOST: ${{ github.event.inputs.target_host || '61.139.2.69' }}
      TARGET_PORTS: ${{ github.event.inputs.target_ports || '80,443' }}
      PROBE_ATTEMPTS: ${{ github.event.inputs.probe_attempts || '3' }}
      PROBE_TIMEOUT_MS: ${{ github.event.inputs.probe_timeout_ms || '1500' }}
      REGION: ${{ github.event.inputs.region || 'github-actions' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run fixed target probe
        run: node scripts/probe-fixed-target.mjs

      - name: Upload fixed target probe artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fixed-target-probe-${{ github.run_id }}
          path: |
            data/results/fixed_target_probe_*.json
            data/results/fixed_target_probe_*.csv
          if-no-files-found: warn
          retention-days: 7
